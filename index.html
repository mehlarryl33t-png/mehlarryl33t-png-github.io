<section class="player">

    <button onclick="play()">Play</button>
    <button onclick="pause()">Pause</button>
    <button onclick="next()">Next</button>
  </div>

<!-- CHAT -->
<div class="chat" id="chat"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLB()">
  <img id="lbImg">
</div>

<script>
/* LIVE VIEWS */
let views = 0;
setInterval(()=>{
  views += Math.floor(Math.random()*2);
  document.getElementById("views").innerText = views;
},2000);

/* LIGHTBOX */
const photos = document.querySelectorAll(".photo img");
const lb = document.getElementById("lightbox");
const lbImg = document.getElementById("lbImg");

photos.forEach(img=>{
  img.onclick = () => {
    lb.style.display="flex";
    lbImg.src = img.src;
  }
});

function closeLB(){
  lb.style.display="none";
}

/* MUSIC */
const audio=document.getElementById("audio");
const playlist=["phantogram.mp3","larryjune.mp3","truetou.mp3"];
let i=0;

function play(){
  audio.src=playlist[i];
  audio.play();
}

function pause(){
  audio.pause();
}

function next(){
  i=(i+1)%playlist.length;
  play();
}

/* CHAT */
const chat=document.getElementById("chat");
const msgs=["yo","fire","W","nice shot","legend","🔥"];

setInterval(()=>{
  const d=document.createElement("div");
  d.className="msg";
  d.textContent=msgs[Math.floor(Math.random()*msgs.length)];
  chat.appendChild(d);
  setTimeout(()=>d.remove(),6000);
},2500);

/* SCROLL ANIM */
const items=document.querySelectorAll(".photo");

const obs=new IntersectionObserver(e=>{
  e.forEach(el=>{
    if(el.isIntersecting){
      el.target.classList.add("show");
    }
  });
},{threshold:0.2});

items.forEach(el=>obs.observe(el));

/* POPUP */
setInterval(()=>{
  const p=document.createElement("div");
  p.className="popup";
  p.textContent="👤 New viewer";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),3000);
},7000);
</script>
