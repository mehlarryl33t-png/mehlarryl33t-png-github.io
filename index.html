<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slawinski Mateusz Photo Art</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      background:#0a0a0a;
      color:#eee;
      font-family:'Inter', sans-serif;
    }

    h1,h2 {
      font-family:'Playfair Display', serif;
      letter-spacing:1px;
    }

    /* HERO */
    header {
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('tlo.jpg') center/cover no-repeat;
      position:relative;
    }

    header h1 {
      font-size:3.5rem;
      margin-bottom:10px;
      animation:fadeUp 1.2s ease;
    }

    header p {
      color:#ccc;
      letter-spacing:2px;
      text-transform:uppercase;
      font-size:0.9rem;
      animation:fadeUp 1.6s ease;
    }

    nav {
      position:absolute;
      top:30px;
    }

    nav a {
      margin:0 15px;
      color:#ccc;
      text-decoration:none;
      font-size:0.8rem;
      letter-spacing:2px;
      text-transform:uppercase;
      transition:0.3s;
    }

    nav a:hover { color:#fff; }

    /* GALLERY PREMIUM STACK */
    .gallery {
      max-width:900px;
      margin:auto;
      padding:100px 20px;
    }

    .gallery img {
      width:100%;
      height:auto;
      margin-bottom:80px;
      display:block;
      opacity:0;
      transform:translateY(40px);
      transition:1s;
    }

    .gallery img.visible {
      opacity:1;
      transform:translateY(0);
    }

    .gallery img:hover {
      transform:scale(1.02);
      opacity:0.95;
    }

    /* ABOUT */
    .about {
      max-width:700px;
      margin:120px auto;
      text-align:center;
      padding:0 20px;
    }

    .about p {
      margin-top:20px;
      color:#aaa;
      line-height:1.7;
    }

    /* FOOTER */
    footer {
      text-align:center;
      padding:40px;
      color:#666;
      border-top:1px solid #222;
      margin-top:60px;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to { opacity:1; transform:translateY(0); }
    }

  </style>
</head>
<body>

<header>
  <nav>
    <a href="#gallery">Galeria</a>
    <a href="#about">O mnie</a>
    <a href="#contact">Kontakt</a>
  </nav>

  <h1>Slawinski Mateusz</h1>
  <p>Photo Art Portfolio</p>
</header>

<section id="gallery" class="gallery">

  <!-- 🔥 DODAWAJ ZDJĘCIA TUTAJ (jedno pod drugim) -->
  <img src="foto1.jpg">
  <img src="foto2.jpg">
  <img src="foto3.jpg">

</section>

<section id="about" class="about">
  <h2>O mnie</h2>
  <p>
    Tworzę fotografie. Każde ujęcie to historia zamknięta w jednym kadrze.
  </p>
</section>

<section id="contact" class="about">
  <h2>Kontakt</h2>
  <p>Instagram: @https://www.instagram.com/larry_l33t.photo</p>
</section>

<footer>
  <p>© 2018 Slawinski Mateusz Photo Art</p>
</footer>

<script>
  // ANIMACJA POJAWIANIA SIĘ ZDJĘĆ
  const images = document.querySelectorAll('.gallery img');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  });

  images.forEach(img => observer.observe(img));
</script>

</body>
</html>
