<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Mateusz Slawinski — Art Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
    }

    header {
      text-align: center;
      padding: 120px 20px 60px;
      border-bottom: 1px solid #1a1a1a;
    }

    header h1 {
      font-family: 'Playfair Display';
      font-size: 56px;
      margin-bottom: 10px;
    }

    header p {
      color: #777;
      letter-spacing: 3px;
      font-size: 12px;
      text-transform: uppercase;
    }

    section {
      padding: 80px 8%;
    }

    .section-title {
      font-family: 'Playfair Display';
      font-size: 28px;
      margin-bottom: 40px;
    }

    /* ABOUT */
    .about {
      max-width: 700px;
      color: #bbb;
      line-height: 1.9;
      margin: 0 auto;
      text-align: center;
    }

    /* GALLERY */
    .photo {
      display: flex;
      justify-content: center;
      margin-bottom: 80px;
    }

    .photo img {
      width: 70%;
      max-width: 900px;
      border-radius: 8px;
      transition: 0.8s;
      cursor: pointer;
    }

    .photo img:hover {
      transform: scale(1.03);
    }

    /* CONTACT */
    .contact {
      text-align: center;
    }

    .contact a {
      display: block;
      color: white;
      text-decoration: none;
      margin-bottom: 10px;
      border-bottom: 1px solid #444;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }

    footer {
      text-align: center;
      padding: 50px;
      color: #666;
      border-top: 1px solid #1a1a1a;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 34px;
      }

      .photo img {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<header>
