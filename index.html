<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Mateusz Slawinski — Art Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #fff;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* HERO */
    header {
      height: 85vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid #1a1a1a;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      letter-spacing: 1px;
    }

    header p {
      color: #888;
      margin-top: 10px;
      letter-spacing: 3px;
      font-size: 12px;
    }

    /* SECTIONS */
    section {
      padding: 100px 8%;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      margin-bottom: 60px;
    }

    /* GALLERY */
    .photo {
      display: flex;
      justify-content: center;
      margin-bottom: 100px;
      opacity: 0;
      transform: translateY(60px);
      transition: 1.2s ease;
    }

    .photo.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .photo img {
      width: 70%;
      max-width: 900px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 1s ease, box-shadow 0.5s;
    }

    .photo img:hover {
      transform: scale(1.03);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
    }

    /* ABOUT */
    .about {
      max-width: 600px;
      color: #bbb;
      line-height: 1.8;
    }

    /* CONTACT */
    .contact p {
      color: #aaa;
      margin-bottom: 10px;
    }

    .contact a {
      color: white;
      text-decoration: none;
      border-bottom: 1px solid #555;
    }

    footer {
      text-align: center;
      padding: 50px;
      border-top: 1px solid #1a1a1a;
      color: #666;
    }

    @media (max-width: 768px) {
      .photo img {
        width: 90%;
      }

      header h1 {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Mateusz Slawinski</h1>
  <p>ART PORTFOLIO</p>
</header>

<section>
  <h2 class="section-title">Gallery</h2>

  <!-- ZDJĘCIA -->
  <div class="photo"><img src="https://voided.host/_next/image?url=https%3A%2F%2Fcdn.voided.host%2Fimages%2F019d1d87-1b277-c5a8-e079-9a5ec94d0617%2F019d3029-65da7-9c7b-a888-5f0c757beff8.jpg"></div>
  <div class="photo"><img src="https://voided.host/_next/image?url=https%3A%2F%2Fcdn.voided.host%2Fimages%2F019d1d87-1b277-c5a8-e079-9a5ec94d0617%2F019d3029-642a7-bc7a-6ec6-86e8fef49ee2.jpg"></div>
  <div class="photo"><img src="LINK3.jpg"></div>
  <div class="photo"><img src="LINK2.jpg"></div>
  <div class="photo"><img src="LINK3.jpg"></div>
  <div class="photo"><img src="LINK2.jpg"></div>
  <div class="photo"><img src="LINK3.jpg"></div>
  <div class="photo"><img src="LINK2.jpg"></div>
  <div class="photo"><img src="LINK3.jpg"></div>
  <div class="photo"><img src="LINK2.jpg"></div>
  <div class="photo"><img src="LINK3.jpg"></div>
  <div class="photo"><img src="LINK2.jpg"></div>
  <div class="photo"><img src="LINK3.jpg"></div>
  <div class="photo"><img src="LINK2.jpg"></div>
  <div class="photo"><img src="LINK3.jpg"></div>

</section>

<section>
  <h2 class="section-title">About</h2>
  <div class="about">
    <p>
     Tworzę fotografie. Każde ujęcie to historia zamknięta w jednym kadrze.
    </p>
  </div>
</section>

<section>
  <h2 class="section-title">Contact</h2>
  <div class="contact">
   
    <p>Instagram: www.instagram.com/larry_l33t.photo/</p>
  </div>
</section>

<footer>
  © 2016 Mateusz Slawinski
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<script>
  // ANIMACJE
  const photos = document.querySelectorAll('.photo');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  });

  photos.forEach(p => observer.observe(p));

  // LIGHTBOX
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  document.querySelectorAll(".photo img").forEach(img => {
    img.addEventListener("click", () => {
      lightbox.style.display = "flex";
      lightboxImg.src = img.src;
    });
  });

  lightbox.addEventListener("click", () => {
    lightbox.style.display = "none";
  });
</script>

</body>
</html>
