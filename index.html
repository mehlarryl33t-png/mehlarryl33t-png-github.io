<!-- Skrypt API sterujący dźwiękiem i zapętleniem -->
<script>
    if (!window.YT) {
        var tag = document.createElement('script');
        tag.src = "https://youtube.com";
        var firstScriptTag = document.getElementsByTagName('script');
        if (firstScriptTag && firstScriptTag.length > 0) {
            firstScriptTag[0].parentNode.insertBefore(tag, firstScriptTag[0]);
        } else {
            document.head.appendChild(tag);
        }
    }

    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-loop-player', {
            events: {
                'onReady': function(event) {
                    event.target.playVideo();
                },
                'onStateChange': function(event) {
                    // Wymuszenie ponownego odtworzenia po zakończeniu piosenki (zapętlenie)
                    if (event.data === YT.PlayerState.ENDED) {
                        player.playVideo();
                    }
                }
            }
        });
    }

    // Aktywacja audio po interakcji z przyciskiem
    document.getElementById('activate-audio-btn').addEventListener('click', function() {
        if (player && typeof player.unMute === 'function') {
            player.unMute();
            player.setVolume(100);
            player.playVideo();
            this.innerText = "🎵 TERAZ GRA";
            this.style.backgroundColor = "#333333";
            this.style.color = "#ffffff";
            this.style.cursor = "default";
        }
    });
</script>
