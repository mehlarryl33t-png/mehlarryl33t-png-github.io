<script>
const player = document.getElementById("audioPlayer");
const title = document.getElementById("songTitle");

function playSong(song, songName) {
  player.src = song;
  player.play();
  title.textContent = songName;
}

function toggleMusic() {
  if (player.paused) {
    player.play();
  } else {
    player.pause();
  }
}
</script>
