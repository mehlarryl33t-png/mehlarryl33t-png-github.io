<script>
const audio = document.getElementById("audio");
const track = document.getElementById("track");

const playlist = [
  { file: "phantogramwhenmsmall.mp3", name: "Phantogram — When I’m Small" },
  { file: "larryjunethesmoothkind.mp3", name: "Larry June — The Smooth Kind" },
  { file: "truetoue.mp3", name: "True To U" }
];

let index = 0;

function load() {
  audio.src = playlist[index].file;
  track.textContent = playlist[index].name;
}

function play() {
  if (!audio.src) load();
  audio.play();
}

function stop() {
  audio.pause();
  audio.currentTime = 0;
}

function next() {
  index++;
  if (index >= playlist.length) index = 0;
  load();
  audio.play();
}

load();
</script>
