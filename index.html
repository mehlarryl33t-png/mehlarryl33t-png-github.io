<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mateusz Slawinski — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Inter, sans-serif;
}

header {
  text-align: center;
  padding: 100px 20px;
}

h1 {
  font-family: "Playfair Display";
  font-size: 50px;
}

section {
  padding: 60px 10%;
}

.about {
  text-align: center;
  max-width: 700px;
  margin: auto;
  color: #bbb;
  line-height: 1.8;
}

.gallery img {
  width: 100%;
  max-width: 800px;
  margin: 20px auto;
  display: block;
  border-radius: 10px;
}

.video {
  display: flex;
  justify-content: center;
  margin: 40px 0;
}

video {
  width: 90%;
  max-width: 900px;
  border-radius: 12px;
}

/* PLAYER */
#player {
  max-width: 400px;
  margin: 50px auto;
  background: #1b1f36;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

button {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #2b3155;
  color: white;
}

button:hover {
  background: #3a4270;
}

#current {
  margin: 10px 0;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<header>
  <h1>Mateusz Slawinski</h1>
  <p>ART PORTFOLIO</p>
</header>

<section>
  <div class="about">
    Tworzę fotografie. Każde ujęcie to historia zamknięta w jednym kadrze.
  </div>
</section>

<section class="gallery">
  <img src="https://cdn.voided.host/images/019e13cf-b6997-4937-718d-3006bc5ea04a/019e2741-10907-b0be-d29a-3c77b7f6e775.jpg">
  <img src="https://cdn.voided.host/images/019e13cf-b6997-4937-718d-3006bc5ea04a/019e2740-fa7e7-3b49-d419-7c9f6e55f0d5.jpg">
  <img src="https://cdn.voided.host/images/019e13cf-b6997-4937-718d-3006bc5ea04a/019e2740-fcc77-a670-b774-7093ee220db1.jpg">
</section>

<section class="video">
  <video controls>
    <source src="vhsrwb.mp4" type="video/mp4">
  </video>
</section>

<section class="video">
  <video controls>
    <source src="drift.mp4" type="video/mp4">
  </video>
</section>

<!-- MUSIC PLAYER -->
<section>
<div id="player">
  <h3>🎧 Music Player</h3>
  <div id="current">Brak utworu</div>

  <button onclick="playSong('phantogramwhenmsmall.mp3','Phantogram — When I’m Small')">Utwór 1</button>
  <button onclick="playSong('larryjunethesmoothkind.mp3','Larry June — The Smooth Kind')">Utwór 2</button>
  <button onclick="playSong('truetoue.mp3','True To U')">Utwór 3</button>

  <button onclick="toggle()">Play / Pause</button>
</div>

<audio id="audio"></audio>
</section>

<script>
const audio = document.getElementById("audio");
const current = document.getElementById("current");

function playSong(file, name) {
  audio.src = file;
  audio.play();
  current.textContent = name;
}

function toggle() {
  if (audio.paused) audio.play();
  else audio.pause();
}
</script>

</body>
</html>
