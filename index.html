<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mateusz Sławiński — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Inter, sans-serif;
}

/* HEADER */
header {
  text-align: center;
  padding: 120px 20px 60px;
  border-bottom: 1px solid #1f1f1f;
}

h1 {
  font-family: "Playfair Display";
  font-size: 52px;
  margin: 0;
}

header p {
  letter-spacing: 4px;
  font-size: 12px;
  color: #777;
  margin-top: 10px;
  text-transform: uppercase;
}

/* SECTIONS */
section {
  padding: 80px 10%;
  border-bottom: 1px solid #1f1f1f;
}

/* ABOUT */
.about {
  max-width: 700px;
  margin: auto;
  text-align: center;
  color: #bbb;
  line-height: 1.8;
}

/* GALLERY */
.gallery img {
  width: 100%;
  max-width: 850px;
  display: block;
  margin: 25px auto;
  border-radius: 10px;
  transition: 0.4s;
}

.gallery img:hover {
  transform: scale(1.02);
}

/* VIDEO */
.video {
  display: flex;
  justify-content: center;
  margin: 40px 0;
}

video {
  width: 90%;
  max-width: 900px;
  border-radius: 12px;
}

/* MUSIC PLAYER */
.player {
  max-width: 420px;
  margin: auto;
  background: #121426;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  text-align: center;
}

.player h2 {
  margin: 0 0 10px;
  font-family: "Playfair Display";
}

#song {
  font-size: 13px;
  color: #aaa;
  margin: 10px 0 20px;
  min-height: 20px;
}

.player button {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #232846;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.player button:hover {
  background: #3a4270;
}

/* CONTACT */
.contact {
  text-align: center;
}

.contact h2 {
  font-family: "Playfair Display";
  margin-bottom: 20px;
}

.contact a {
  display: inline-block;
  padding: 14px 22px;
  border: 1px solid #333;
  border-radius: 12px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.contact a:hover {
  background: #ff2d75;
  border-color: #ff2d75;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px;
  color: #666;
  font-size: 12px;
}
</style>
</head>

<body>

<header>
  <h1>Mateusz Sławiński</h1>
  <p>ART & VIDEO PORTFOLIO</p>
</header>

<section>
  <div class="about">
    Tworzę fotografie i obrazy wideo. Każdy kadr to emocja zamknięta w czasie.
  </div>
</section>

<!-- GALLERY -->
<section class="gallery">
  <img src="https://cdn.voided.host/images/019e13cf-b6997-4937-718d-3006bc5ea04a/019e2741-10907-b0be-d29a-3c77b7f6e775.jpg">
  <img src="https://cdn.voided.host/images/019e13cf-b6997-4937-718d-3006bc5ea04a/019e2740-fa7e7-3b49-d419-7c9f6e55f0d5.jpg">
  <img src="https://cdn.voided.host/images/019e13cf-b6997-4937-718d-3006bc5ea04a/019e2740-fcc77-a670-b774-7093ee220db1.jpg">
</section>

<!-- VIDEO -->
<section class="video">
  <video controls>
    <source src="vhsrwb.mp4" type="video/mp4">
  </video>
</section>

<section class="video">
  <video controls>
    <source src="drift.mp4" type="video/mp4">
  </video>
</section>

<!-- MUSIC -->
<section>
  <div class="player">
    <h2>🎧 Music</h2>
    <div id="song">Brak utworu</div>

    <button onclick="play('phantogramwhenmsmall.mp3','Phantogram — When I’m Small')">Phantogram</button>
    <button onclick="play('larryjunethesmoothkind.mp3','Larry June — The Smooth Kind')">Larry June</button>
    <button onclick="play('truetoue.mp3','True To U')">True To U</button>

    <button onclick="toggle()">▶ / ⏸ Play Pause</button>
  </div>

  <audio id="audio"></audio>
</section>

<!-- CONTACT -->
<section class="contact">
  <h2>Contact</h2>
  <a href="https://www.instagram.com/larry_l33t.photo/" target="_blank">
    Instagram @larry_l33t.photo
  </a>
</section>

<footer>
  © 2026 Mateusz Sławiński
</footer>

<script>
const audio = document.getElementById("audio");
const song = document.getElementById("song");

function play(file, name) {
  audio.src = file;
  audio.play();
  song.textContent = name;
}

function toggle() {
  if (audio.paused) audio.play();
  else audio.pause();
}
</script>

</body>
</html>
