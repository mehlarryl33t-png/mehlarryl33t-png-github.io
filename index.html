<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slawinski Mateusz Photo Art</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background:#0a0a0a;
      color:#eee;
      font-family:'Inter', sans-serif;
    }

    h1,h2 {
      font-family:'Playfair Display', serif;
    }

    header {
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('twoje-tlo.jpg') center/cover;
    }

    header h1 {
      font-size:3rem;
    }

    nav a {
      margin:0 10px;
      color:#ccc;
      text-decoration:none;
    }

    .gallery {
      padding:40px;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(300px,1fr));
      gap:20px;
    }

    .gallery img {
      width:100%;
      height:300px;
      object-fit:cover;
      cursor:pointer;
    }

    .lightbox {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:black;
      display:none;
      justify-content:center;
      align-items:center;
    }

    .lightbox img {
      max-width:90%;
      max-height:90%;
    }
  </style>
</head>
<body>

<header>
  <h1>Slawinski Mateusz</h1>
  <p>Photo Art Portfolio</p>
</header>

<section class="gallery">
  <img src="foto1.jpg" onclick="openLightbox(this.src)">
  <img src="foto2.jpg" onclick="openLightbox(this.src)">
</section>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
function openLightbox(src) {
  document.getElementById('lightbox').style.display = 'flex';
  document.getElementById('lightbox-img').src = src;
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}
</script>

</body>
</html>
