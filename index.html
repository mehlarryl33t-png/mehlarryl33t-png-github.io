<style>

body{
  margin:0;
  background:#0a0a0f;
  color:#fff;
  font-family:Inter,sans-serif;
  overflow-x:hidden;
}

/* CINEMA BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, #ff2d7515, transparent 40%),
    radial-gradient(circle at 80% 60%, #4f7cff12, transparent 40%);
  pointer-events:none;
}

/* HEADER */
header{
  text-align:center;
  padding:120px 20px 60px;
}
h1{
  font-family:"Playfair Display";
  font-size:58px;
  margin:0;
}
header p{
  letter-spacing:4px;
  font-size:12px;
  color:#888;
  text-transform:uppercase;
}

/* ABOUT */
.about{
  max-width:700px;
  margin:60px auto;
  text-align:center;
  color:#bbb;
  line-height:1.9;
}

/* STATS */
.stats{
  position:fixed;
  top:15px;
  right:15px;
  background:rgba(255,255,255,0.05);
  padding:10px 14px;
  border-radius:12px;
  backdrop-filter:blur(12px);
  font-size:12px;
  color:#aaa;
  z-index:9999;
}

/* MUSIC */
.music{
  text-align:center;
  margin:40px 0;
}
.music button{
  background:#222;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  color:#fff;
  cursor:pointer;
}

/* GALLERY CINEMA GRID */
.gallery{
  max-width:1200px;
  margin:0 auto;
  padding:60px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
}

.photo{
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
}

.photo img{
  width:100%;
  height:340px;
  object-fit:cover;
  transition:0.5s ease;
}

.photo img:hover{
  transform:scale(1.06);
  filter:brightness(1.1);
}

/* LIGHTBOX FULL ORIGINAL SIZE */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
  overflow:auto;
  padding:40px;
}

.lightbox img{
  max-width:none;
  max-height:none;
  cursor:zoom-out;
}

/* VIDEO */
.video{
  display:flex;
  justify-content:center;
  margin:60px 0;
}

video{
  width:90%;
  max-width:900px;
  border-radius:12px;
}

/* CHAT */
.chat{
  position:fixed;
  left:15px;
  bottom:15px;
  width:240px;
  height:320px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:12px;
  color:#ddd;
}

.msg{
  background:rgba(255,255,255,0.05);
  padding:6px 8px;
  border-radius:8px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:60px;
  color:#666;
  border-top:1px solid #222;
  letter-spacing:2px;
}

</style>
</head>

<script>

/* ================= VIEWS ================= */
let views = localStorage.getItem("views") || 0;
views++;
localStorage.setItem("views", views);
document.getElementById("views").innerText = views;

/* fake online */
setInterval(()=>{
  document.getElementById("online").innerText =
  Math.floor(5 + Math.random()*25);
},2000);

/* ================= MUSIC ================= */
const audio = document.getElementById("audio");

const playlist = [
  "phantogram.mp3",
  "larryjunethesmoothkind.mp3",
  "truetoue.mp3"
];

let i = 0;

function startMusic(){
  audio.src = playlist[i];
  audio.play().catch(()=>{});
}

audio.addEventListener("ended", ()=>{
  i = (i+1)%playlist.length;
  audio.src = playlist[i];
  audio.play();
});

/* ================= VIDEO STOP MUSIC ================= */
document.querySelectorAll("video").forEach(v=>{
  v.addEventListener("play", ()=>audio.pause());
  v.addEventListener("ended", ()=>audio.play().catch(()=>{}));
});

/* ================= LIGHTBOX (ORIGINAL SIZE) ================= */
const imgs = document.querySelectorAll(".photo img");
const lb = document.getElementById("lightbox");
const lbImg = document.getElementById("lbImg");

imgs.forEach(img=>{
  img.onclick = ()=>{
    lb.style.display="flex";
    lbImg.src = img.src;
  };
});

function closeLB(){
  lb.style.display="none";
}

/* ================= CHAT ================= */
const chat = document.getElementById("chat");

const msgs = ["yo","fire","W","legend","🔥","nice shot"];

setInterval(()=>{
  const d = document.createElement("div");
  d.className="msg";
  d.textContent = msgs[Math.floor(Math.random()*msgs.length)];
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  setTimeout(()=>d.remove(),6000);
},2500);

</script>
