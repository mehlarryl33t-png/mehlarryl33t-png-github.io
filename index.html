<script>
const audio = document.getElementById("audio");
const track = document.getElementById("track");
const progress = document.querySelector(".progress");

// GitHub Pages-safe path
const base = window.location.pathname.includes(".github.io")
  ? "/" + window.location.pathname.split("/")[1] + "/"
  : "./";

const playlist = [
  { file: base + "phantogramwhenmsmall.mp3", name: "Phantogram — When I’m Small" },
  { file: base + "larryjunethesmoothkind.mp3", name: "Larry June — The Smooth Kind" },
  { file: base + "truetoue.mp3", name: "True To U" }
];

let index = 0;
let isShuffle = false;
let isRepeat = false;

/* LOAD + AUTOPLAY */
function load(autoPlay = true) {
  audio.src = playlist[index].file;
  track.textContent = playlist[index].name;
  audio.load();

  if (autoPlay) {
    const playPromise = audio.play();

    if (playPromise !== undefined) {
      playPromise.catch(() => {
        console.log("Autoplay zablokowany — czekam na kliknięcie");

        document.body.addEventListener("click", () => {
          audio.play();
        }, { once: true });
      });
    }
  }
}

/* PLAY */
function play() {
  audio.play().catch(() => {});
}

/* STOP */
function stop() {
  audio.pause();
  audio.currentTime = 0;
}

/* NEXT */
function next() {
  if (isShuffle) {
    index = Math.floor(Math.random() * playlist.length);
  } else {
    index = (index + 1) % playlist.length;
  }
  load(true);
}

/* PREV */
function prev() {
  index = (index - 1 + playlist.length) % playlist.length;
  load(true);
}

/* SHUFFLE */
function toggleShuffle() {
  isShuffle = !isShuffle;
}

/* REPEAT */
function toggleRepeat() {
  isRepeat = !isRepeat;
}

/* PROGRESS BAR */
audio.addEventListener("timeupdate", () => {
  if (!audio.duration) return;
  progress.style.width = (audio.currentTime / audio.duration) * 100 + "%";
});

/* SEEK */
function seek(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;
  audio.currentTime = percent * audio.duration;
}

/* AUTO NEXT */
audio.addEventListener("ended", () => {
  if (isRepeat) {
    audio.currentTime = 0;
    audio.play();
  } else {
    next();
  }
});

/* START */
load(true);
</script>
