<style>
body {
  margin: 0;
  background: #050505;
  color: #fff;
  font-family: Inter, sans-serif;
}

/* TOP */
header {
  padding: 140px 20px 60px;
  text-align: center;
}

h1 {
  font-family: "Playfair Display";
  font-size: 64px;
  margin: 0;
  letter-spacing: 1px;
}

.sub {
  margin-top: 10px;
  color: #888;
  letter-spacing: 4px;
  font-size: 12px;
  text-transform: uppercase;
}

/* ABOUT */
.about {
  max-width: 700px;
  margin: 0 auto;
  text-align: center;
  color: #bbb;
  line-height: 1.8;
  padding: 40px 20px 80px;
}

/* GALLERY PREMIUM */
.gallery {
  max-width: 1400px;
  margin: auto;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 18px;
}

.photo {
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  background: #111;
}

.photo img {
  width: 100%;
  height: 340px;
  object-fit: cover;
  transition: 0.5s ease;
  cursor: pointer;
}

.photo:hover img {
  transform: scale(1.08);
  filter: brightness(1.1);
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.lightbox img {
  max-width: 92%;
  max-height: 92%;
  border-radius: 12px;
}

/* MUSIC BAR */
.music {
  text-align: center;
  padding: 60px 20px;
}

button {
  background: #151515;
  border: 1px solid #333;
  color: white;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  background: #222;
}

/* CHAT */
.chat {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 220px;
  font-size: 12px;
}

.msg {
  background: rgba(255,255,255,0.05);
  padding: 6px 8px;
  border-radius: 8px;
  margin-bottom: 6px;
  backdrop-filter: blur(10px);
}

/* VIEWS */
.views {
  position: fixed;
  top: 15px;
  left: 15px;
  background: rgba(0,0,0,0.5);
  border: 1px solid #222;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 12px;
}
</style>
</head>

<script>

/* VIEWS */
let v = 0;
setInterval(()=>{
  v += Math.floor(Math.random()*2);
  document.getElementById("views").innerText = v;
},2000);

/* LIGHTBOX */
const imgs = document.querySelectorAll(".photo img");
const lb = document.getElementById("lightbox");
const lbImg = document.getElementById("lbImg");

imgs.forEach(i=>{
  i.onclick = () => {
    lb.style.display = "flex";
    lbImg.src = i.src;
  }
});

function closeLB(){
  lb.style.display = "none";
}

/* MUSIC FIX (IMPORTANT) */
const audio = document.getElementById("audio");

const playlist = [
  "phantogram.mp3",
  "larryjune.mp3",
  "truetou.mp3"
];

let index = 0;
let started = false;

function startMusic(){
  if(started) return;
  started = true;
  play();
}

function play(){
  audio.src = playlist[index];
  audio.play().catch(()=>{});
}

function next(){
  index = (index+1)%playlist.length;
  play();
}

/* CHAT FAKE */
const chat = document.getElementById("chat");
const msgs = ["nice 🔥","W","clean","legend","yo"];

setInterval(()=>{
  const d = document.createElement("div");
  d.className = "msg";
  d.textContent = msgs[Math.floor(Math.random()*msgs.length)];
  chat.appendChild(d);
  setTimeout(()=>d.remove(),5000);
},3000);

</script>
