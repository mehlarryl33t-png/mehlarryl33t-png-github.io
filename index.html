<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Inter, sans-serif;
}

/* HEADER */
header {
  text-align: center;
  padding: 120px 20px 60px;
  border-bottom: 1px solid #1f1f1f;
}

h1 {
  font-family: "Playfair Display";
  font-size: 52px;
  margin: 0;
}

header p {
  letter-spacing: 4px;
  font-size: 12px;
  color: #777;
  margin-top: 10px;
  text-transform: uppercase;
}

/* SECTIONS */
section {
  padding: 80px 10%;
  border-bottom: 1px solid #1f1f1f;
}

/* ABOUT */
.about {
  max-width: 700px;
  margin: auto;
  text-align: center;
  color: #bbb;
  line-height: 1.8;
}

/* GALLERY */
.gallery {
  max-width: 900px;
  margin: auto;
}

.photo {
  margin-bottom: 40px;
  overflow: hidden;
  border-radius: 14px;
}

.photo img {
  width: 100%;
  height: 520px;       /* 🔥 duże zdjęcia */
  object-fit: cover;
  display: block;
  transition: 0.4s ease;
}

.photo img:hover {
  transform: scale(1.05);
}

/* VIDEO */
.video {
  display: flex;
  justify-content: center;
  margin: 40px 0;
}

video {
  width: 90%;
  max-width: 900px;
  border-radius: 12px;
}

/* MUSIC PLAYER */
.player {
  text-align: center;
}

.box {
  display: inline-block;
  background: #121426;
  padding: 20px;
  border-radius: 14px;
  min-width: 260px;
}

#track {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 15px;
  min-height: 18px;
}

.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
}

button {
  background: #232846;
  border: none;
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #3a4270;
}

/* CONTACT */
.contact {
  text-align: center;
}

.contact a {
  display: inline-block;
  padding: 14px 20px;
  border: 1px solid #333;
  border-radius: 12px;
  color: white;
  text-decoration: none;
}

.contact a:hover {
  background: #ff2d75;
  border-color: #ff2d75;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px;
  color: #666;
  font-size: 12px;
}

/* MOBILE */
@media (max-width: 768px) {
  .photo img {
    height: 320px;
  }
}
</style>
</head>

<script>
const audio = document.getElementById("audio");
const track = document.getElementById("track");
const progress = document.querySelector(".progress");

/* GitHub Pages base path */
const base = "./";

const playlist = [
  { file: base + "phantogram.mp3", name: "Phantogram — When I’m Small" },
  { file: base + "larryjunethesmoothkind.mp3", name: "Larry June — The Smooth Kind" },
  { file: base + "truetoue.mp3", name: "True To U" }
];

let index = 0;
let isShuffle = false;
let isRepeat = false;
let started = false;
let wasPlayingBeforeVideo = false;

/* LOAD TRACK */
function load(autoPlay = true) {
  audio.src = playlist[index].file;
  track.textContent = playlist[index].name;
  audio.load();

  if (autoPlay) tryPlay();
}

/* SAFE PLAY (autoplay fix) */
function tryPlay() {
  const playPromise = audio.play();

  if (playPromise !== undefined) {
    playPromise
      .then(() => {
        started = true;
      })
      .catch(() => {
        console.log("Autoplay zablokowany — czekam na interakcję");

        const startOnInteraction = () => {
          audio.play().catch(() => {});
          started = true;

          document.removeEventListener("click", startOnInteraction);
          document.removeEventListener("touchstart", startOnInteraction);
        };

        document.addEventListener("click", startOnInteraction, { once: true });
        document.addEventListener("touchstart", startOnInteraction, { once: true });
      });
  }
}

/* PLAY */
function play() {
  audio.play().catch(() => {});
}

/* STOP */
function stop() {
  audio.pause();
  audio.currentTime = 0;
}

/* NEXT */
function next() {
  if (isShuffle) {
    index = Math.floor(Math.random() * playlist.length);
  } else {
    index = (index + 1) % playlist.length;
  }

  load(true);
}

/* PREV */
function prev() {
  index = (index - 1 + playlist.length) % playlist.length;
  load(true);
}

/* SHUFFLE */
function toggleShuffle() {
  isShuffle = !isShuffle;
}

/* REPEAT */
function toggleRepeat() {
  isRepeat = !isRepeat;
}

/* PROGRESS BAR */
audio.addEventListener("timeupdate", () => {
  if (!audio.duration) return;

  progress.style.width =
    (audio.currentTime / audio.duration) * 100 + "%";
});

/* SEEK */
function seek(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;

  audio.currentTime = percent * audio.duration;
}

/* AUTO NEXT */
audio.addEventListener("ended", () => {
  if (isRepeat) {
    audio.currentTime = 0;
    audio.play().catch(() => {});
  } else {
    next();
  }
});

/* VIDEO DETECTION */
function setupVideoListeners() {
  const videos = document.querySelectorAll("video");

  videos.forEach(video => {

    /* START VIDEO */
    video.addEventListener("play", () => {

      /* zatrzymaj muzykę tylko jeśli gra */
      if (!audio.paused) {
        wasPlayingBeforeVideo = true;
        audio.pause();
      }

    });

    /* PAUSE VIDEO */
    video.addEventListener("pause", () => {

      /* wznowienie tylko jeśli wcześniej grała */
      if (
        wasPlayingBeforeVideo &&
        !video.ended
      ) {
        audio.play().catch(() => {});
      }

    });

    /* END VIDEO */
    video.addEventListener("ended", () => {

      if (wasPlayingBeforeVideo) {
        audio.play().catch(() => {});
      }

    });

  });
}

/* AUTO START ATTEMPT */
window.addEventListener("load", () => {
  load(true);
  setupVideoListeners();
});

/* MOBILE / TAB FALLBACK */
document.addEventListener("visibilitychange", () => {

  if (!document.hidden && !started) {
    tryPlay();
  }

});
</script>
