<script>
const audio = document.getElementById("audio");
const track = document.getElementById("track");
const progress = document.querySelector(".progress");

/* GitHub Pages base path */
const base = "./";

const playlist = [
  { file: base + "phantogram.mp3", name: "Phantogram — When I’m Small" },
  { file: base + "larryjunethesmoothkind.mp3", name: "Larry June — The Smooth Kind" },
  { file: base + "truetoue.mp3", name: "True To U" }
];

let index = 0;
let isShuffle = false;
let isRepeat = false;
let started = false;
let wasPlayingBeforeVideo = false;

/* LOAD TRACK */
function load(autoPlay = true) {
  audio.src = playlist[index].file;
  track.textContent = playlist[index].name;
  audio.load();

  if (autoPlay) tryPlay();
}

/* SAFE PLAY (autoplay fix) */
function tryPlay() {
  const playPromise = audio.play();

  if (playPromise !== undefined) {
    playPromise
      .then(() => {
        started = true;
      })
      .catch(() => {
        console.log("Autoplay zablokowany — czekam na interakcję");

        const startOnInteraction = () => {
          audio.play().catch(() => {});
          started = true;

          document.removeEventListener("click", startOnInteraction);
          document.removeEventListener("touchstart", startOnInteraction);
        };

        document.addEventListener("click", startOnInteraction, { once: true });
        document.addEventListener("touchstart", startOnInteraction, { once: true });
      });
  }
}

/* PLAY */
function play() {
  audio.play().catch(() => {});
}

/* STOP */
function stop() {
  audio.pause();
  audio.currentTime = 0;
}

/* NEXT */
function next() {
  if (isShuffle) {
    index = Math.floor(Math.random() * playlist.length);
  } else {
    index = (index + 1) % playlist.length;
  }

  load(true);
}

/* PREV */
function prev() {
  index = (index - 1 + playlist.length) % playlist.length;
  load(true);
}

/* SHUFFLE */
function toggleShuffle() {
  isShuffle = !isShuffle;
}

/* REPEAT */
function toggleRepeat() {
  isRepeat = !isRepeat;
}

/* PROGRESS BAR */
audio.addEventListener("timeupdate", () => {
  if (!audio.duration) return;

  progress.style.width =
    (audio.currentTime / audio.duration) * 100 + "%";
});

/* SEEK */
function seek(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;

  audio.currentTime = percent * audio.duration;
}

/* AUTO NEXT */
audio.addEventListener("ended", () => {
  if (isRepeat) {
    audio.currentTime = 0;
    audio.play().catch(() => {});
  } else {
    next();
  }
});

/* VIDEO DETECTION */
function setupVideoListeners() {
  const videos = document.querySelectorAll("video");

  videos.forEach(video => {

    /* START VIDEO */
    video.addEventListener("play", () => {

      /* zatrzymaj muzykę tylko jeśli gra */
      if (!audio.paused) {
        wasPlayingBeforeVideo = true;
        audio.pause();
      }

    });

    /* PAUSE VIDEO */
    video.addEventListener("pause", () => {

      /* wznowienie tylko jeśli wcześniej grała */
      if (
        wasPlayingBeforeVideo &&
        !video.ended
      ) {
        audio.play().catch(() => {});
      }

    });

    /* END VIDEO */
    video.addEventListener("ended", () => {

      if (wasPlayingBeforeVideo) {
        audio.play().catch(() => {});
      }

    });

  });
}

/* AUTO START ATTEMPT */
window.addEventListener("load", () => {
  load(true);
  setupVideoListeners();
});

/* MOBILE / TAB FALLBACK */
document.addEventListener("visibilitychange", () => {

  if (!document.hidden && !started) {
    tryPlay();
  }

});
</script>
